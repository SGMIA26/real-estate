<script>
        const WEBHOOK_URL = 'https://saigonmia.tino.page/webhook/valuation';
        const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
        const TIMEOUT_MS = 90 * 1000; // 90 giây
        const ALLOWED_TYPES = ['application/pdf', 'image/jpeg', 'image/png'];

        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const loading = document.getElementById('loading');
        const result = document.getElementById('result');
        const errorBox = document.getElementById('error-box');
        const consentCheck = document.getElementById('consent-check');
        let isProcessing = false;

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = (e) => startUpload(e.target.files);
        dropZone.ondragover = (e) => { e.preventDefault(); dropZone.style.borderColor = '#3b82f6'; };
        dropZone.ondragleave = () => { dropZone.style.borderColor = '#475569'; };
        dropZone.ondrop = (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '#475569';
            startUpload(e.dataTransfer.files);
        };

        function showError(msg) {
            errorBox.innerText = msg;
            errorBox.style.display = 'block';
        }

        function setProcessing(state) {
            isProcessing = state;
            dropZone.classList.toggle('disabled', state);
            loading.style.display = state ? 'block' : 'none';
        }

        async function startUpload(files) {
            if (isProcessing) return;
            
            // Xóa lỗi cũ và ẩn các hộp kết quả cũ trước khi bắt đầu
            errorBox.style.display = 'none';
            result.style.display = 'none';
            
            const insBox = document.getElementById('insight-box');
            if (insBox) insBox.style.display = 'none'; 

            if (!files || files.length === 0) return;

            if (!consentCheck.checked) {
                showError('Vui lòng tích xác nhận đồng ý xử lý dữ liệu trước khi tải hồ sơ lên.');
                return;
            }

            const file = files[0];

            if (!ALLOWED_TYPES.includes(file.type)) {
                showError('Định dạng không hỗ trợ. Vui lòng dùng file JPG, PNG hoặc PDF.');
                return;
            }
            if (file.size > MAX_FILE_SIZE) {
                showError('File vượt quá 10MB. Vui lòng nén hoặc chụp lại với dung lượng nhỏ hơn.');
                return;
            }

            setProcessing(true);

            const fd = new FormData();
            fd.append('file', file);

            const controller = new AbortController();
            const timer = setTimeout(() => controller.abort(), TIMEOUT_MS);

            try {
                const response = await fetch(WEBHOOK_URL, {
                    method: 'POST',
                    body: fd,
                    mode: 'cors',
                    signal: controller.signal
                });
                clearTimeout(timer);

                if (!response.ok) {
                    throw new Error('Máy chủ trả về lỗi ' + response.status + '. Kiểm tra workflow n8n đang Active.');
                }

                const res = await response.json();
                setProcessing(false);

                const info = res.thong_tin_dat || {};
                const bang = res.bang_so_sanh || {};
                const market = bang.gia_thi_truong || {};
                const ai = bang.gia_ai_platform || {};
                const state = bang.gia_nha_nuoc || {};

                if (!res.thong_tin_dat && !res.bang_so_sanh) {
                    throw new Error('Dữ liệu trả về không đúng cấu trúc. Kiểm tra node "Respond to Webhook" trong n8n.');
                }

                document.getElementById('res-vung').innerText = info.vung_dinh_vi || 'N/A';
                document.getElementById('res-loaihinh').innerText = info.loai_hinh || 'N/A';
                document.getElementById('res-dientich').innerText = info.dien_tich || 'N/A';

                const mapping = {
                    'cell-market-unit': market.don_gia,
                    'cell-market-total': market.tong_tien,
                    'cell-market-src': market.nguon,
                    'cell-ai-unit': ai.don_gia,
                    'cell-ai-total': ai.tong_tien,
                    'cell-ai-src': ai.nguon,
                    'cell-state-unit': state.don_gia,
                    'cell-state-total': state.tong_tien,
                    'cell-state-src': state.nguon
                };
                Object.keys(mapping).forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.innerText = mapping[id] || '—';
                });

                // Hiển thị nhận xét AI
                const txtNhanXet = document.getElementById('res-nhanxet');
                if (txtNhanXet) {
                    txtNhanXet.innerHTML = res.nhan_xet_ai || 'Chưa có nhận xét chi tiết cho khu vực này.';
                }
                if (insBox) insBox.style.display = 'block';

                result.style.display = 'block';
            } catch (err) {
                clearTimeout(timer);
                setProcessing(false);
                if (err.name === 'AbortError') {
                    showError('Quá thời gian xử lý (90 giây). Hồ sơ có thể quá lớn hoặc máy chủ AI đang quá tải — vui lòng thử lại.');
                } else {
                    showError(err.message || 'Không thể kết nối đến Máy chủ AI. Đảm bảo workflow n8n đang ở trạng thái Active.');
                }
            } finally {
                fileInput.value = '';
            }
        }
    </script>
