<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Real Estate Valuation Platform</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: system-ui, sans-serif; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { background-color: #1e293b; padding: 30px; border: 1px solid #334155; max-width: 800px; width: 100%; border-radius: 16px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); text-align: center; box-sizing: border-box; }
        h1 { font-size: 24px; font-weight: 800; color: #38bdf8; margin-bottom: 5px; margin-top: 0; }
        p.subtitle { color: #94a3b8; font-size: 14px; margin-top: 0; margin-bottom: 25px; }
        .drop-zone { border: 2px dashed #475569; border-radius: 12px; padding: 30px; background-color: rgba(15,23,42,0.5); cursor: pointer; transition: 0.2s; }
        .drop-zone:hover { border-color: #3b82f6; background-color: #0f172a; }
        .drop-zone.disabled { opacity: 0.5; pointer-events: none; }
        .cloud-icon { width: 50px; height: 50px; fill: #3b82f6; margin-bottom: 10px; }
        .consent { font-size: 12px; color: #94a3b8; margin-top: 12px; text-align: left; display: flex; align-items: flex-start; gap: 8px; }
        .consent input { margin-top: 2px; flex-shrink: 0; }
        .loading { display: none; margin: 20px 0; padding: 15px; background: rgba(30,58,138,0.4); border: 1px solid #1e40af; border-radius: 8px; color: #60a5fa; font-weight: bold; }
        .error-box { display: none; margin: 20px 0; padding: 15px; background: rgba(153,27,27,0.25); border: 1px solid #b91c1c; border-radius: 8px; color: #fca5a5; font-size: 14px; text-align: left; }
        .result-box { display: none; text-align: left; margin-top: 25px; }
        .info-grid { display: flex; gap: 20px; background: #0f172a; padding: 15px; border-radius: 8px; border: 1px solid #334155; font-size: 14px; margin-bottom: 20px; flex-wrap: wrap; }
        .info-grid span { color: #64748b; }
        .info-grid strong { color: #38bdf8; }
        .table-wrapper { overflow-x: auto; border: 1px solid #334155; border-radius: 8px; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; text-align: left; }
        th { background: #0f172a; color: #94a3b8; padding: 12px; font-weight: 600; border-bottom: 1px solid #334155; }
        td { padding: 12px; border-bottom: 1px solid #334155; }
        tr:hover { background: rgba(51,65,85,0.3); }
        .txt-market { color: #f59e0b; font-weight: bold; }
        .txt-ai { color: #10b981; font-weight: bold; }
        .txt-state { color: #94a3b8; font-weight: bold; }
        
        /* CỘ SỦNG CSS HỘP NHẬN XÉT AI */
        .insight-box { display: none; background: rgba(16, 185, 129, 0.05); border: 1px solid rgba(16, 185, 129, 0.2); border-radius: 12px; padding: 20px; margin-top: 20px; text-align: left; }
        .insight-box h3 { margin-top: 0; font-size: 15px; color: #10b981; display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
        .insight-box p { margin: 0; font-size: 13.5px; color: #cbd5e1; line-height: 1.6; }
        
        .disclaimer { font-size: 11px; color: #475569; font-style: italic; margin-top: 20px; line-height: 1.5; border-top: 1px solid #334155; padding-top: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h1>HỆ THỐNG ĐỊNH GIÁ BẤT ĐỘNG SẢN THÔNG MINH</h1>
        <p class="subtitle">Hỗ trợ tự động bóc tách pháp lý và phân loại địa giới hành chính sáp nhập mới</p>

        <div id="drop-zone" class="drop-zone">
            <svg class="cloud-icon" viewBox="0 0 24 24">
                <path d="M19.35 10.04C18.67 6.59 15.64 4 12 4 9.11 4 6.6 5.64 5.35 8.04 2.34 8.36 0 10.91 0 14c0 3.31 2.69 6 6 6h13c2.76 0 5-2.24 5-5 0-2.64-2.05-4.78-4.65-4.96zM14 13v4h-4v-4H7l5-5 5 5h-3z"/>
            </svg>
            <p style="margin: 5px 0; font-weight: 500;">Kéo thả Sổ Đỏ / Bản vẽ tọa độ vào đây</p>
            <p style="margin: 0; color: #475569; font-size: 12px;">Hỗ trợ JPG, PNG hoặc PDF — tối đa 10MB</p>
            <input type="file" id="file-input" style="display: none;" accept=".pdf,image/jpeg,image/png">
        </div>

        <label class="consent">
            <input type="checkbox" id="consent-check">
            <span>Tôi đồng ý cho hệ thống xử lý hình ảnh giấy tờ đất để phục vụ mục đích định giá tham khảo. Dữ liệu không được lưu trữ sau khi xử lý.</span>
        </label>

        <div id="loading" class="loading">🤖 AI đang phân
